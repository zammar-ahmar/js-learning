<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch JS</title>
</head>
<body>
    <h1> Fetch API in JavaScript</h1>
    <p> The Fetch API provides a modern, promise-based way to make asynchronous HTTP requests 
          to servers. It is a more powerful and flexible alternative to the older <br>
          XMLHttpRequest (XHR) API.</p>     

   
</body>

 <script>
        // fetch('https://jsonplaceholder.typicode.com/posts')
        // .then(response => response.json())
        // .then(data => console.log(data))
        // .catch(error => console.error('Error:', error));

        async function fetchData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        fetchData();
    </script>

</html>

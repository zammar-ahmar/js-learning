    <h1> Async in JavaScript</h1>
    <p> Asynchronous programming is a programming paradigm that allows you to write code that 
    can perform multiple tasks concurrently without blocking the main thread. <br>
    In JavaScript, asynchronous programming is commonly achieved using callbacks,s promises, and
        async/await syntax.</p>
    
</body>

<script>
 let test = async()=>{
   console.log("2: meassge");
  await console.log("3: meassge");
   console.log("4: meassge");
   
 }

   console.log("1: meassge");
   
    test();
    
   console.log("5: meassge");
